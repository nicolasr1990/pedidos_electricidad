<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pedidos Eléctricos</title>

<!-- PWA -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pedidos Eléctricos">
<meta name="theme-color" content="#0d0f14">
<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0d0f14;
  --card: #161921;
  --card2: #1c1f2b;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f2f7;
  --muted: #6b7280;
  --muted2: #9ca3af;
  --yellow: #f59e0b;
  --yellow-bg: rgba(245,158,11,0.1);
  --yellow-border: rgba(245,158,11,0.25);
  --green: #10b981;
  --green-bg: rgba(16,185,129,0.1);
  --green-border: rgba(16,185,129,0.3);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
  --red-border: rgba(248,113,113,0.25);
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,0.1);
  --blue-border: rgba(96,165,250,0.25);
  --orange: #fb923c;
  --orange-bg: rgba(251,146,60,0.1);
  --orange-border: rgba(251,146,60,0.25);
}

html { font-size: 16px; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 40px;
}

/* HEADER */
.hdr {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.hdr-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.hdr-brand { display: flex; align-items: center; gap: 10px; }
.hdr-bolt {
  width: 34px; height: 34px;
  background: var(--yellow-bg);
  border: 1px solid var(--yellow-border);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.hdr-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.hdr-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.pill-count {
  background: var(--yellow);
  color: #000;
  font-weight: 700;
  font-size: 13px;
  border-radius: 20px;
  padding: 3px 12px;
  min-width: 32px;
  text-align: center;
}

/* NOMBRE */
.nombre-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 8px 12px;
}
.nombre-row svg { flex-shrink: 0; opacity: 0.5; }
.nombre-input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  flex: 1;
  min-width: 0;
}
.nombre-input::placeholder { color: var(--muted); }

/* FILTROS */
.filtros {
  padding: 10px 16px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.filtros::-webkit-scrollbar { display: none; }
.filt {
  background: var(--card);
  border: 1px solid var(--border2);
  color: var(--muted2);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  flex-shrink: 0;
}
.filt.on { background: var(--yellow-bg); border-color: var(--yellow-border); color: var(--yellow); }

/* LISTA */
.lista { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

/* TARJETA */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: opacity 0.35s, transform 0.35s;
}
.card.urgente { border-left: 3px solid var(--red); }
.card.saliendo { opacity: 0; transform: translateX(50px); }

.card-top {
  padding: 12px 14px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.card-id {
  font-size: 11px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  background: var(--card2);
  border-radius: 5px;
  padding: 2px 8px;
}
.badges { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
.badge {
  font-size: 10px;
  font-weight: 600;
  border-radius: 5px;
  padding: 2px 7px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.b-urg  { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.b-norm { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
.b-pend { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
.b-falta { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.b-dpec  { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }

.card-body { padding: 0 14px 12px; }
.card-dir {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.35;
}
.card-desc {
  font-size: 12px;
  color: var(--muted2);
  line-height: 1.5;
  margin-bottom: 8px;
}
.card-meta {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.meta {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 3px;
}
.meta-dot {
  width: 3px; height: 3px;
  background: var(--muted);
  border-radius: 50%;
  opacity: 0.5;
}

/* ACCIONES */
.card-acc {
  border-top: 1px solid var(--border);
  padding: 12px 14px;
  background: rgba(255,255,255,0.01);
}
.acc-label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 8px;
}
.acc-btns {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin-bottom: 10px;
}
.btn-est {
  background: var(--card2);
  border: 1px solid var(--border2);
  color: var(--muted2);
  border-radius: 10px;
  padding: 10px 4px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  text-align: center;
  line-height: 1.3;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.btn-est .ico { font-size: 16px; }
.btn-est.ok.sel, .btn-est.ok:active  { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
.btn-est.fa.sel, .btn-est.fa:active  { background: var(--red-bg); border-color: var(--red-border); color: var(--red); }
.btn-est.dp.sel, .btn-est.dp:active  { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue); }
.btn-est.pe.sel, .btn-est.pe:active  { background: var(--yellow-bg); border-color: var(--yellow-border); color: var(--yellow); }

/* NOTA DE PENDIENTE — visible en la tarjeta */
.card-nota {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  background: var(--yellow-bg);
  border: 1px solid var(--yellow-border);
  border-radius: 8px;
  padding: 7px 10px;
  margin-top: 8px;
  font-size: 12px;
  color: var(--yellow);
  line-height: 1.4;
}
.card-nota-ico { flex-shrink: 0; font-size: 13px; margin-top: 1px; }
.b-pend-nota { background: rgba(245,158,11,0.2); color: var(--yellow); border: 1px solid var(--yellow-border); }

.obs {
  width: 100%;
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  padding: 9px 12px;
  resize: none;
  outline: none;
  display: none;
  margin-bottom: 8px;
  transition: border-color 0.15s;
}
.obs:focus { border-color: rgba(245,158,11,0.5); }
.obs.v { display: block; }

.btn-save {
  width: 100%;
  background: var(--yellow);
  color: #000;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  display: none;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-save:active { transform: scale(0.98); opacity: 0.85; }
.btn-save.v { display: block; }
.btn-save:disabled { opacity: 0.45; }

.res-ok  { background: var(--green-bg); color: var(--green); border-radius: 8px; padding: 8px 12px; font-size: 12px; font-weight: 500; margin-top: 8px; display: none; }
.res-err { background: var(--red-bg);   color: var(--red);   border-radius: 8px; padding: 8px 12px; font-size: 12px; font-weight: 500; margin-top: 8px; display: none; }
.res-ok.v, .res-err.v { display: block; }

/* LOADER / EMPTY */
.loader {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 70px 20px; gap: 14px; color: var(--muted);
  font-size: 14px;
}
.spin {
  width: 30px; height: 30px;
  border: 3px solid var(--border2);
  border-top-color: var(--yellow);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty { text-align: center; padding: 70px 20px; }
.empty-ico { font-size: 38px; margin-bottom: 10px; }
.empty-t { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-s { font-size: 13px; color: var(--muted); }

/* TOAST */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green); color: #000;
  font-weight: 700; font-size: 13px;
  padding: 10px 20px; border-radius: 25px;
  z-index: 999; transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap; pointer-events: none;
}
.toast.s { transform: translateX(-50%) translateY(0); }
.toast.e { background: var(--red); color: #fff; }

/* BANNER INSTALAR */
.install-banner {
  background: var(--yellow-bg);
  border: 1px solid var(--yellow-border);
  border-radius: 12px;
  margin: 10px 16px 0;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.install-banner-text { font-size: 12px; color: var(--yellow); line-height: 1.4; }
.install-banner-text strong { display: block; font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.install-btn {
  background: var(--yellow);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  flex-shrink: 0;
}
.install-banner.oculto { display: none; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-brand">
      <div class="hdr-bolt">⚡</div>
      <div>
        <div class="hdr-title">Pedidos Eléctricos</div>
        <div class="hdr-sub">Municipalidad · Activos</div>
      </div>
    </div>
    <div class="pill-count" id="cnt">—</div>
  </div>
  <div class="nombre-row">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <input class="nombre-input" id="nombre" type="text" placeholder="Tu nombre…" maxlength="40" autocomplete="name">
  </div>
</div>

<!-- Banner instalar PWA (solo aparece si el browser lo soporta y no está instalada) -->
<div class="install-banner oculto" id="installBanner">
  <div class="install-banner-text">
    <strong>📲 Instalar como app</strong>
    Accedé sin el navegador, más rápido
  </div>
  <button class="install-btn" id="installBtn">Instalar</button>
</div>

<div class="filtros">
  <button class="filt on" data-f="todos"          onclick="filtrar(this)">Todos</button>
  <button class="filt"    data-f="Pendiente"       onclick="filtrar(this)">Pendiente</button>
  <button class="filt"    data-f="Falta material"  onclick="filtrar(this)">Falta material</button>
  <button class="filt"    data-f="DPEC"            onclick="filtrar(this)">DPEC</button>
  <button class="filt"    data-f="URGENTE"         onclick="filtrar(this)">⚡ Urgente</button>
</div>

<div id="lista" class="lista">
  <div class="loader"><div class="spin"></div>Cargando pedidos…</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIGURACIÓN — reemplazá con tu URL de Apps Script
// ============================================================
var API_URL = 'https://script.google.com/macros/s/AKfycbz9XRh5NpGmH4-x0hKkKsOkHHwipoWuskZy5JjjxPxBr8xMQ9DSmQgdVkZ9Cqg3Fbem/exec';
// ============================================================

var todos = [], filtroActivo = 'todos', estadosSel = {};

// ------------------------------------------------------------
// CARGA DE DATOS
// ------------------------------------------------------------
function cargar() {
  fetch(API_URL + '?action=getPedidos', { redirect: 'follow' })
    .then(function(r) { return r.json(); })
    .then(render)
    .catch(function(e) {
      document.getElementById('lista').innerHTML =
        '<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-t">Error al cargar</div><div class="empty-s">' + e + '</div></div>';
    });
}

function render(data) {
  todos = data;
  document.getElementById('cnt').textContent = data.length;
  aplicar();
}

// ------------------------------------------------------------
// FILTROS
// ------------------------------------------------------------
function filtrar(btn) {
  document.querySelectorAll('.filt').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  filtroActivo = btn.dataset.f;
  aplicar();
}

function aplicar() {
  var lista = todos;
  if (filtroActivo === 'URGENTE') lista = todos.filter(function(p) { return p.urgencia === 'URGENTE'; });
  else if (filtroActivo !== 'todos') lista = todos.filter(function(p) { return p.estado === filtroActivo; });
  dibujar(lista);
}

// ------------------------------------------------------------
// RENDER TARJETAS
// ------------------------------------------------------------
function badgeEst(e, obs) {
  if (e === 'Pendiente') {
    if (obs) return '<span class="badge b-pend-nota">📝 Pendiente</span>';
    return '<span class="badge b-pend">Pendiente</span>';
  }
  if (e === 'Falta material') return '<span class="badge b-falta">Falta mat.</span>';
  if (e === 'DPEC')           return '<span class="badge b-dpec">DPEC</span>';
  return '<span class="badge">' + e + '</span>';
}

function dibujar(lista) {
  var c = document.getElementById('lista');
  if (!lista.length) {
    c.innerHTML = '<div class="empty"><div class="empty-ico">✅</div><div class="empty-t">Sin pedidos activos</div><div class="empty-s">No hay pedidos en este filtro.</div></div>';
    return;
  }
  c.innerHTML = lista.map(function(p) {
    var urg = p.urgencia === 'URGENTE';
    var notaHtml = p.observaciones
      ? '<div class="card-nota"><span class="card-nota-ico">📝</span><span>' + p.observaciones + '</span></div>'
      : '';
    return '<div class="card' + (urg ? ' urgente' : '') + '" id="c-' + p.id + '">' +
      '<div class="card-top">' +
        '<span class="card-id">#' + p.id + '</span>' +
        '<div class="badges">' +
          (urg ? '<span class="badge b-urg">Urgente</span>' : '<span class="badge b-norm">Normal</span>') +
          badgeEst(p.estado, p.observaciones) +
        '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-dir">📍 ' + p.direccion + '</div>' +
        '<div class="card-desc">' + p.descripcion + '</div>' +
        notaHtml +
        '<div class="card-meta" style="margin-top:8px">' +
          '<span class="meta">📅 ' + p.fechaIngreso + '</span>' +
          '<span class="meta-dot"></span>' +
          '<span class="meta">👤 ' + p.solicitante + '</span>' +
          '<span class="meta-dot"></span>' +
          '<span class="meta">' + p.origen + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="card-acc">' +
        '<div class="acc-label">Cambiar estado</div>' +
        '<div class="acc-btns">' +
          '<button class="btn-est ok" onclick="sel(' + p.id + ',\'Resuelto\',this)"><span class="ico">✅</span>Resuelto</button>' +
          '<button class="btn-est fa" onclick="sel(' + p.id + ',\'Falta material\',this)"><span class="ico">⚠️</span>Falta mat.</button>' +
          '<button class="btn-est dp" onclick="sel(' + p.id + ',\'DPEC\',this)"><span class="ico">🔌</span>DPEC</button>' +
          '<button class="btn-est pe" onclick="sel(' + p.id + ',\'Pendiente\',this)"><span class="ico">📝</span>Pendiente</button>' +
        '</div>' +
        '<textarea class="obs" id="o-' + p.id + '" rows="2" placeholder="Observaciones (opcional)…"></textarea>' +
        '<button class="btn-save" id="s-' + p.id + '" onclick="guardar(' + p.id + ')">Guardar cambio</button>' +
        '<div class="res-ok" id="rok-' + p.id + '">✓ Registrado correctamente</div>' +
        '<div class="res-err" id="rer-' + p.id + '"></div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ------------------------------------------------------------
// SELECCIÓN Y GUARDADO
// ------------------------------------------------------------
function sel(id, estado, btn) {
  estadosSel[id] = estado;
  var btns = btn.closest('.acc-btns').querySelectorAll('.btn-est');
  btns.forEach(function(b) { b.classList.remove('sel'); });
  btn.classList.add('sel');
  var obsEl = document.getElementById('o-' + id);
  obsEl.classList.add('v');
  // Si elige Pendiente, la observación es obligatoria
  if (estado === 'Pendiente') {
    obsEl.placeholder = 'Aclaración obligatoria (¿por qué sigue pendiente?)';
    obsEl.style.borderColor = 'rgba(245,158,11,0.5)';
  } else {
    obsEl.placeholder = 'Observaciones (opcional)…';
    obsEl.style.borderColor = '';
  }
  document.getElementById('s-' + id).classList.add('v');
}

function guardar(id) {
  var nombre = document.getElementById('nombre').value.trim();
  if (!nombre) { toast('Ingresá tu nombre arriba ☝️', true); document.getElementById('nombre').focus(); return; }
  var estado = estadosSel[id];
  if (!estado) return;
  var obs = document.getElementById('o-' + id).value.trim();

  // Pendiente requiere observación
  if (estado === 'Pendiente' && !obs) {
    toast('Escribí una aclaración para dejar pendiente ☝️', true);
    document.getElementById('o-' + id).focus();
    return;
  }

  var btn = document.getElementById('s-' + id);
  var rok = document.getElementById('rok-' + id);
  var rer = document.getElementById('rer-' + id);
  btn.disabled = true;
  btn.textContent = 'Guardando…';
  rok.className = 'res-ok'; rer.className = 'res-err';

  // Apps Script no soporta CORS con POST desde dominios externos.
  // Mandamos todo por GET codificando los datos en la URL.
  var params = '?action=actualizarEstado' +
    '&idPedido='       + encodeURIComponent(String(id)) +
    '&estado='         + encodeURIComponent(estado) +
    '&observaciones='  + encodeURIComponent(obs) +
    '&actualizadoPor=' + encodeURIComponent(nombre);

  fetch(API_URL + params, { redirect: 'follow' })
  .then(function(r) { return r.json(); })
  .then(function(r) {
    btn.disabled = false; btn.textContent = 'Guardar cambio';
    if (r.ok) {
      if (estado === 'Pendiente') {
        // No sacar la tarjeta — actualizar en el lugar
        toast('📝 Nota guardada en pedido #' + id);
        rok.className = 'res-ok v';
        // Actualizar la nota visible en la tarjeta sin recargar
        var pedido = todos.find(function(p) { return String(p.id) === String(id); });
        if (pedido) { pedido.observaciones = obs; }
        // Refrescar solo los badges y la nota de esta tarjeta
        var card = document.getElementById('c-' + id);
        var badgesPend = card.querySelector('.badges');
        if (badgesPend) {
          var urgBadge = badgesPend.querySelector('.b-urg, .b-norm');
          badgesPend.innerHTML = (urgBadge ? urgBadge.outerHTML : '') + badgeEst('Pendiente', obs);
        }
        var notaExistente = card.querySelector('.card-nota');
        var notaNueva = '<div class="card-nota"><span class="card-nota-ico">📝</span><span>' + obs + '</span></div>';
        if (notaExistente) {
          notaExistente.outerHTML = notaNueva;
        } else {
          var descEl = card.querySelector('.card-desc');
          if (descEl) descEl.insertAdjacentHTML('afterend', notaNueva);
        }
        // Resetear acciones
        document.getElementById('o-' + id).classList.remove('v');
        document.getElementById('s-' + id).classList.remove('v');
        card.querySelectorAll('.btn-est').forEach(function(b) { b.classList.remove('sel'); });
        delete estadosSel[id];
        setTimeout(function() { rok.className = 'res-ok'; }, 2500);
      } else {
        // Resuelto / Falta material / DPEC → sacar la tarjeta
        toast('✓ Pedido #' + id + ' actualizado');
        var card2 = document.getElementById('c-' + id);
        card2.classList.add('saliendo');
        setTimeout(function() {
          card2.remove();
          todos = todos.filter(function(p) { return String(p.id) !== String(id); });
          document.getElementById('cnt').textContent = todos.length;
          if (!todos.length) aplicar();
        }, 380);
      }
    } else {
      rer.textContent = 'Error: ' + (r.error || 'desconocido');
      rer.className = 'res-err v';
      toast('Error al guardar', true);
    }
  })
  .catch(function(e) {
    btn.disabled = false; btn.textContent = 'Guardar cambio';
    rer.textContent = 'Error: ' + e;
    rer.className = 'res-err v';
    toast('Error al guardar', true);
  });
}

// ------------------------------------------------------------
// TOAST
// ------------------------------------------------------------
function toast(msg, err) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err ? ' e' : '') + ' s';
  setTimeout(function() { t.className = 'toast' + (err ? ' e' : ''); }, 2600);
}

// ------------------------------------------------------------
// PWA — Install prompt
// ------------------------------------------------------------
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.remove('oculto');
});
document.getElementById('installBtn').addEventListener('click', function() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function() {
    deferredPrompt = null;
    document.getElementById('installBanner').classList.add('oculto');
  });
});
window.addEventListener('appinstalled', function() {
  document.getElementById('installBanner').classList.add('oculto');
});

// ------------------------------------------------------------
// INIT
// ------------------------------------------------------------
window.onload = function() {
  var n = localStorage.getItem('elec_nombre');
  if (n) document.getElementById('nombre').value = n;
  document.getElementById('nombre').addEventListener('change', function() {
    localStorage.setItem('elec_nombre', this.value.trim());
  });
  cargar();
};
</script>
